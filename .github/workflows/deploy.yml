# ─────────────────────────────────────────────────────────────────────────────
# BlackBox Trip Tracker — GitHub Pages Deploy
#
# Triggers on every push to main (or master).
# Publishes index.html as a pure static site — no build step needed.
#
# Setup (one-time):
#   Repository → Settings → Pages
#     Source: "GitHub Actions"   ← select this option
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant the workflow permission to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # 1. Check out the repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Prepare the Pages artifact
      #    We serve index.html from the repo root.
      #    The "upload-pages-artifact" action expects a directory path;
      #    we point it at "." so it picks up index.html (and any other
      #    static assets you add later).
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repo root as the site
          path: '.'

      # 3. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
